<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DLF VISION</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <div id="page-transition" style="transform:translateY(0);transition:none;"></div>
  <div id="aura"></div>
  <canvas id="c"></canvas>
  <div id="canvas-zone"></div>

  <div id="cursor-container">
    <div id="cursor"></div>
  </div>

  <header id="site-header">
    <nav>
      <a href="/" class="brand">DLF <em>Vision</em></a>
      <ul class="nav-links">
        <li><a href="/archive/">Archive</a></li>
        <li><a href="/realisations/">Realisations</a></li>
        <li><a href="/contact/" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

<div id="hud">
    <div id="intro-bar">
      <p class="pre-label">DLF — INITIALISATION DE LA VISION</p>
      <div class="pre-bar-track">
        <div class="pre-bar-fill" id="barFill"></div>
      </div>
      <span class="pre-pct" id="pctCounter">0%</span>
    </div>

    <p id="tagline" class="tagline"></p>

  </div>

  <div id="section-content">
    <p class="section-para">
      NOS REALISATIONS
    </p>
  </div>

  <div id="scroll-space"></div>

  <section id="section-projets">
    <div class="projet-card">
      <div class="projet-media">
        <img src="./src/assets/SOSA BL - MY TYPE OF LOVE_MINIATURE.png" alt="SOSA BL — My Type of Love" class="projet-cover" />
        <video class="projet-video" src="./src/assets/SOSA BL - MY TYPE OF LOVE TRIM PREVIEW.mp4" loop muted playsinline></video>
      </div>
      <div class="projet-meta">
        <span class="projet-artist">SOSA BL</span>
        <span class="projet-title">MY TYPE OF LOVE</span>
      </div>

      <img src="./src/assets/MiniatureVideo1.png" alt="" class="projet-extra-img" />
      <video class="projet-video" src="./src/assets/JUAN P - FREESTYLE SOS PREVIEW.mp4" loop muted playsinline></video>
    </div>
  </section>

  <!-- Modal vidéo -->
  <div id="video-modal">
    <div id="video-modal-inner">
      <button id="video-modal-close" aria-label="Fermer">✕</button>
      <div id="video-modal-frame"></div>
    </div>
  </div>

  <script src="/transition.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
